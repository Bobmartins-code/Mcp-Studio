<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MCP Studio — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0A0A0F;--sur:#111118;--sur2:#18181F;--bo:rgba(255,255,255,.07);--boh:rgba(255,255,255,.14);--ac:#FF4D00;--ac2:#FF8A50;--gold:#F5C842;--ok:#2DDE98;--tx:#F0EEE8;--mu:#6B6B7A;--mu2:#9B9BAA}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center}
.wrap{width:100%;max-width:420px;padding:24px}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:40px;justify-content:center}
.logo-mark{width:40px;height:40px;background:var(--ac);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:#fff}
.logo-name{font-family:'Syne',sans-serif;font-weight:700;font-size:20px}
.logo-name span{color:var(--ac)}
.card{background:var(--sur);border:1px solid var(--bo);border-radius:20px;padding:32px}
.card-title{font-family:'Syne',sans-serif;font-weight:700;font-size:20px;margin-bottom:6px}
.card-sub{font-size:13.5px;color:var(--mu2);margin-bottom:28px}
.fi{display:flex;flex-direction:column;gap:5px;margin-bottom:16px}
.fi label{font-size:12px;font-weight:500;color:var(--mu2)}
.fi input{background:var(--sur2);border:1px solid var(--bo);border-radius:8px;color:var(--tx);font-size:14px;padding:11px 14px;outline:none;width:100%;font-family:'DM Sans',sans-serif;transition:border-color .2s}
.fi input:focus{border-color:rgba(255,77,0,.5)}
.btn{width:100%;padding:14px;border-radius:8px;border:none;background:var(--ac);color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;cursor:pointer;transition:all .2s;margin-top:8px}
.btn:hover{background:#FF6520;transform:translateY(-1px);box-shadow:0 8px 24px rgba(255,77,0,.3)}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}
.err{background:rgba(255,77,0,.1);border:1px solid rgba(255,77,0,.3);border-radius:8px;padding:10px 14px;font-size:12.5px;color:var(--ac2);margin-bottom:16px;display:none}
.err.show{display:block}
.ok{background:rgba(45,222,152,.1);border:1px solid rgba(45,222,152,.3);border-radius:8px;padding:10px 14px;font-size:12.5px;color:var(--ok);margin-bottom:16px;display:none}
.ok.show{display:block}
.footer{text-align:center;margin-top:20px;font-size:12px;color:var(--mu)}
.spin-sm{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes sp{to{transform:rotate(360deg)}}
.bg-glow{position:fixed;top:-200px;right:-200px;width:500px;height:500px;background:radial-gradient(circle,rgba(255,77,0,.08),transparent 70%);pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="wrap">
  <div class="logo">
    <div class="logo-mark">M</div>
    <div class="logo-name">MCP<span>Studio</span></div>
  </div>
  <div class="card">
    <div class="card-title">Bem-vindo de volta</div>
    <div class="card-sub">Entre com seu email e senha para acessar a plataforma.</div>
    <div class="err" id="err"></div>
    <div class="ok" id="ok"></div>
    <div class="fi">
      <label>Email</label>
      <input type="email" id="email" placeholder="seu@email.com" autocomplete="email"/>
    </div>
    <div class="fi">
      <label>Senha</label>
      <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="btn" id="btnLogin" onclick="login()">Entrar</button>
  </div>
  <div class="footer">MCP Studio — Metodo de Conteudo de Performance</div>
</div>
<script>
var SUPA_URL = "https://yutqrrcdlkocrpznryqi.supabase.co";
var SUPA_KEY = "sb_publishable_U3wOTwbeEvXtHOqP_I29VQ_ARH5CAkH";
var supabase = window.supabase.createClient(SUPA_URL, SUPA_KEY);

// Verifica se ja esta logado
supabase.auth.getSession().then(function(r){
  if(r.data && r.data.session) {
    window.location.href = "app.html";
  }
});

function showErr(msg){ var e=document.getElementById("err"); e.textContent=msg; e.classList.add("show"); document.getElementById("ok").classList.remove("show"); }
function showOk(msg){ var e=document.getElementById("ok"); e.textContent=msg; e.classList.add("show"); document.getElementById("err").classList.remove("show"); }
function setLoad(on){ var b=document.getElementById("btnLogin"); b.disabled=on; b.innerHTML=on?"<span class='spin-sm'></span>Entrando...":"Entrar"; }

async function login(){
  var email=document.getElementById("email").value.trim();
  var senha=document.getElementById("senha").value;
  if(!email||!senha){showErr("Preencha email e senha.");return;}
  setLoad(true);
  try{
    var r=await supabase.auth.signInWithPassword({email:email,password:senha});
    if(r.error)throw r.error;
    window.location.href="app.html";
  }catch(e){
    showErr(e.message==="Invalid login credentials"?"Email ou senha incorretos.":e.message||"Erro ao entrar.");
    setLoad(false);
  }
}

document.getElementById("senha").addEventListener("keydown",function(e){if(e.key==="Enter")login();});
document.getElementById("email").addEventListener("keydown",function(e){if(e.key==="Enter")document.getElementById("senha").focus();});
</script>
</body>
</html>
