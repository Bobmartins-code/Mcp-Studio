  const [openScripts, setOpenScripts] = useState({});
  const [activeTab, setActiveTab] = useState("roteiros");
  const [copiedId, setCopiedId] = useState(null);
  const [toast, setToast] = useState(null);
  const [apiKey, setApiKey] = useState(localStorage.getItem("mcp_api_key") || "");
  const [apiInput, setApiInput] = useState("");
  const [form, setForm] = useState({ produto:"", publico:"", objetivo:"", diferenciais:"", preco:"", dores:"", objecoes:"" });
  const stepRef = useRef(null);

  useEffect(() => {
    if (!generating) return;
    let i = 0; setGenStep(0);
    stepRef.current = setInterval(() => { i++; if (i < GEN_STEPS.length) setGenStep(i); }, 900);
    return () => clearInterval(stepRef.current);
  }, [generating]);

  function showToast(msg, type="success") {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3000);
  }

  function saveApiKey() {
    localStorage.setItem("mcp_api_key", apiInput);
    setApiKey(apiInput);
    showToast("Chave salva com sucesso! ✓");
  }

  async function handleGenerate() {
    if (!form.produto || !form.publico || !form.objetivo) { showToast("Preencha produto, público e objetivo!", "error"); return; }
    if (!apiKey) { showToast("Insira sua chave de API da Anthropic!", "error"); return; }
    setGenerating(true);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{ "Content-Type":"application/json", "x-api-key": apiKey, "anthropic-version":"2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
        body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:8000, messages:[{ role:"user", content: buildPrompt(form) }] })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      const raw = data.content?.map(b => b.text||"").join("") || "";
      const clean = raw.replace(/```json|```/g,"").trim();
      const parsed = JSON.parse(clean);
      const project = { id:Date.now(), name:form.produto, date:new Date().toLocaleDateString("pt-BR"), objetivo:form.objetivo, form:{...form}, result:parsed };
      setProjects(prev => [project,...prev]);
      setActiveProject(project);
      setGenerating(false);
      setView("results");
      setActiveTab("roteiros");
      setOpenScripts({});
      showToast("18 roteiros gerados com sucesso! 🎉");
    } catch(e) {
      setGenerating(false);
      showToast("Erro: " + (e.message || "Tente novamente."), "error");
    }
  }

  function toggleScript(id) { setOpenScripts(prev => ({...prev, [id]:!prev[id]})); }

  function copyScript(script) {
    const text = `🎬 ${script.titulo}\n📌 Pilar: ${script.pilar}\n\n🎯 GANCHO\n${script.gancho}\n\n📝 CORPO\n${script.corpo}\n\n🔥 CTA\n${script.cta}`;
    navigator.clipboard.writeText(text);
    setCopiedId(script.id);
    setTimeout(() => setCopiedId(null), 2000);
    showToast("Roteiro copiado! ✓");
  }

  function copyAll() {
    if (!activeProject?.result?.roteiros) return;
    const text = activeProject.result.roteiros.map((s,i) =>
      `━━━ ROTEIRO ${i+1} — ${s.pilar} ━━━\n🎯 GANCHO\n${s.gancho}\n\n📝 CORPO\n${s.corpo}\n\n🔥 CTA\n${s.cta}`
    ).join("\n\n");
    navigator.clipboard.writeText(text);
    showToast("Todos os roteiros copiados! ✓");
  }

  function getFunnelTag(funil) {
    if (!funil) return null;
    const map = { topo:"TOPO", meio:"MEIO", fundo:"FUNDO" };
    return React.createElement("span", { className:`tag ${funil}` }, map[funil] || funil.toUpperCase());
  }

  function getFilteredScripts() {
    const r = activeProject?.result?.roteiros || [];
    if (activeTab === "topo") return r.filter(s => s.funil==="topo");
    if (activeTab === "meio") return r.filter(s => s.funil==="meio");
    if (activeTab === "fundo") return r.filter(s => s.funil==="fundo");
    return r;
  }

  const navItems = [
    { id:"home", icon:"🏠", label:"Início" },
    { id:"briefing", icon:"✏️", label:"Novo Projeto" },
    { id:"history", icon:"📂", label:"Histórico", badge: projects.length > 0 ? projects.length : null },
  ];

  function ApiKeyBanner() {
    if (apiKey) return null;
    return (
      <div className="api-key-banner">
        <span style={{fontSize:18}}>🔑</span>
        <div style={{flex:1}}>
          <div style={{fontSize:13,fontWeight:600,marginBottom:4}}>Cole sua chave de API da Anthropic</div>
          <div style={{fontSize:12,color:"var(--muted2)"}}>Obtenha em <a href="https://console.anthropic.com" target="_blank" style={{color:"var(--accent2)"}}>console.anthropic.com</a></div>
        </div>
        <input placeholder="sk-ant-..." value={apiInput} onChange={e => setApiInput(e.target.value)} type="password" style={{width:260}} />
        <button className="api-save-btn" onClick={saveApiKey}>Salvar</button>
      </div>
    );
  }

  function renderHome() {
    return (
      <div className="content">
        <ApiKeyBanner />
        <div className="welcome-hero">
          <div className="hero-tag">✦ Método MCP — Matriz de Conteúdo de Performance</div>
          <h1 className="hero-title">Roteiros que <span>convertem</span>,<br />gerados em segundos.</h1>
          <p className="hero-sub">Preencha o briefing do seu negócio e a IA aplica o método MCP completo — gerando 18 roteiros prontos para Reels e Meta Ads.</p>
          <div className="hero-stats">
            <div className="stat"><div className="stat-num">18</div><div className="stat-label">Roteiros por projeto</div></div>
            <div className="stat"><div className="stat-num">3</div><div className="stat-label">Etapas do funil</div></div>
            <div className="stat"><div className="stat-num">30s</div><div className="stat-label">Duração otimizada</div></div>
          </div>
        </div>
        <div className="cards-grid">
          <div className="feature-card primary" onClick={() => setView("briefing")}>
            <div className="card-icon">⚡</div>
            <div className="card-title">Novo Projeto</div>
            <div className="card-desc">Preencha o briefing e gere 18 roteiros com o método MCP completo.</div>
            <div className="card-cta">Começar agora →</div>
          </div>
          <div className="feature-card"><div className="card-icon">🎯</div><div className="card-title">Full Funnel</div><div className="card-desc">Roteiros para Topo, Meio e Fundo — cobrindo toda a jornada do cliente.</div></div>
          <div className="feature-card"><div className="card-icon">🧠</div><div className="card-title">Inteligência de Público</div><div className="card-desc">Dores, desejos, objeções e gatilhos mapeados automaticamente.</div></div>
          <div className="feature-card"><div className="card-icon">🎬</div><div className="card-title">Formato Reels</div><div className="card-desc">Estrutura otimizada para os primeiros 3 segundos e retenção máxima.</div></div>
          <div className="feature-card"><div className="card-icon">📋</div><div className="card-title">Matriz MCP Visual</div><div className="card-desc">Ângulos, conceitos e ganchos organizados em matriz estratégica.</div></div>
          <div className="feature-card"><div className="card-icon">📂</div><div className="card-title">Histórico</div><div className="card-desc">Todos os seus projetos salvos e acessíveis a qualquer momento.</div></div>
        </div>
        {projects.length > 0 && <>
          <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:16,marginBottom:14}}>Projetos recentes</div>
          <div className="history-list">
            {projects.slice(0,3).map(p => (
              <div key={p.id} className="history-item" onClick={() => { setActiveProject(p); setView("results"); }}>
                <div style={{fontSize:22}}>🎬</div>
                <div className="history-info"><div className="history-name">{p.name}</div><div className="history-meta">{p.objetivo} · {p.date}</div></div>
                <div className="history-badge">18 roteiros</div>
              </div>
            ))}
          </div>
        </>}
      </div>
    );
  }

  function renderBriefing() {
    const steps = [form.produto?"done":"active", form.publico?"done":(form.produto?"active":""), form.objetivo?"done":(form.publico?"active":""), (form.diferenciais||form.dores)?"done":(form.objetivo?"active":"")];
    return (
      <div className="content">
        <ApiKeyBanner />
        <div className="form-wrapper">
          <div className="form-header"><h2>Briefing do Projeto</h2><p>Preencha as informações para gerar 18 roteiros com o método MCP.</p></div>
          <div className="steps-bar">{steps.map((s,i) => <div key={i} className={`step-item ${s}`} />)}</div>

          <div className="form-section">
            <div className="form-section-title">01 — Produto</div>
            <div className="form-field">
              <label>Qual é o produto ou serviço?</label>
              <input placeholder="Ex: Curso de confeitaria online, Skincare anti-idade..." value={form.produto} onChange={e => setForm(f=>({...f,produto:e.target.value}))} />
            </div>
            <div className="form-row">
              <div className="form-field">
                <label>Público-alvo</label>
                <input placeholder="Ex: Mulheres 25-40, empreendedoras..." value={form.publico} onChange={e => setForm(f=>({...f,publico:e.target.value}))} />
              </div>
              <div className="form-field">
                <label>Diferenciais do produto</label>
                <input placeholder="Ex: Entrega rápida, fórmula exclusiva..." value={form.diferenciais} onChange={e => setForm(f=>({...f,diferenciais:e.target.value}))} />
              </div>
            </div>
          </div>

          <div className="form-section">
            <div className="form-section-title">02 — Objetivo da Campanha</div>
            <div className="obj-grid">
              {OBJECTIVES.map(o => (
                <div key={o.id} className={`obj-option ${form.objetivo===o.id?"selected":""}`} onClick={() => setForm(f=>({...f,objetivo:o.id}))}>
                  <div className="obj-icon">{o.icon}</div>
                  <div><div className="obj-label">{o.label}</div><div className="obj-desc">{o.desc}</div></div>
                </div>
              ))}
            </div>
          </div>

          <div className="form-section">
            <div className="form-section-title">03 — Faixa de Preço</div>
            <div className="price-grid">
              {PRICE_OPTIONS.map(p => (
                <div key={p} className={`price-option ${form.preco===p?"selected":""}`} onClick={() => setForm(f=>({...f,preco:p}))}>{p}</div>
              ))}
            </div>
          </div>

          <div className="form-section">
            <div className="form-section-title">04 — Contexto (opcional, mas recomendado)</div>
            <div className="form-field">
              <label>Principais dores do público</label>
              <textarea placeholder="Ex: Não tem tempo, já tentou outros produtos sem resultado..." value={form.dores} onChange={e => setForm(f=>({...f,dores:e.target.value}))} />
            </div>
            <div className="form-field">
              <label>Principais objeções de compra</label>
              <textarea placeholder="Ex: É caro, não sei se funciona pra mim..." value={form.objecoes} onChange={e => setForm(f=>({...f,objecoes:e.target.value}))} />
            </div>
          </div>

          <button className="generate-btn" onClick={handleGenerate} disabled={!form.produto||!form.publico||!form.objetivo}>
            ⚡ Gerar 18 Roteiros com IA
          </button>
        </div>
      </div>
    );
  }

  function renderResults() {
    if (!activeProject) return null;
    const { result, name, date, objetivo } = activeProject;
    const scripts = getFilteredScripts();
    return (
      <div className="content">
        <div className="results-header">
          <div>
            <div className="results-title">🎬 {name}</div>
            <div className="results-meta">{objetivo} · {date} · {result?.roteiros?.length||0} roteiros</div>
          </div>
          <div className="results-actions">
            <button className="action-btn" onClick={copyAll}>📋 Copiar todos</button>
            <button className="action-btn primary" onClick={() => setView("briefing")}>+ Novo</button>
          </div>
        </div>
        <div className="tabs">
          {[{id:"roteiros",label:"Todos"},{id:"topo",label:"🟢 Topo"},{id:"meio",label:"🟡 Meio"},{id:"fundo",label:"🔴 Fundo"},{id:"matriz",label:"Matriz MCP"}].map(t => (
            <button key={t.id} className={`tab-btn ${activeTab===t.id?"active":""}`} onClick={() => setActiveTab(t.id)}>{t.label}</button>
          ))}
        </div>
        {activeTab === "matriz" ? renderMatrix(result?.inteligencia) : (
          <div className="scripts-grid">
            {scripts.map(script => (
              <div key={script.id} className="script-card">
                <div className="script-card-header" onClick={() => toggleScript(script.id)}>
                  <div className="script-num">{script.id}</div>
                  <div className="script-title-area">
                    <div className="script-title">{script.titulo}</div>
                    <div className="script-pilar">{script.pilar}</div>
                  </div>
                  <div className="script-tags">{getFunnelTag(script.funil)}<span className="tag">30s</span></div>
                  <span style={{color:"var(--muted)",marginLeft:8}}>{openScripts[script.id]?"▲":"▼"}</span>
                </div>
                <div className={`script-body ${openScripts[script.id]?"open":""}`}>
                  <div className="script-block"><div className="script-block-label">Gancho</div><div className="script-block-text">{script.gancho}</div></div>
                  <div className="script-block"><div className="script-block-label body-label">Corpo</div><div className="script-block-text">{script.corpo}</div></div>
                  <div className="script-block"><div className="script-block-label cta-label">CTA</div><div className="script-block-text">{script.cta}</div></div>
                  <div className="script-footer">
                    <button className={`copy-btn ${copiedId===script.id?"copied":""}`} onClick={() => copyScript(script)}>
                      {copiedId===script.id?"✓ Copiado":"📋 Copiar roteiro"}
                    </button>
                  </div>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    );
  }

  function renderMatrix(intel) {
    if (!intel) return <div className="empty-state"><div className="empty-icon">📊</div><div className="empty-title">Matriz não disponível</div></div>;
    return (
      <div>
        <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"var(--radius)",padding:20,marginBottom:16}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:16}}>
            {[{label:"Insight do Consumidor",value:intel.insight,color:"var(--accent2)"},{label:"Big Idea",value:intel.bigIdea,color:"var(--gold)"},{label:"Mecanismo Único",value:intel.mecanismo,color:"var(--success)"},{label:"Diferencial Estratégico",value:intel.diferencial,color:"#9B8EFF"}].map(item => (
              <div key={item.label} style={{padding:16,background:"var(--surface2)",borderRadius:"var(--radius-sm)",borderLeft:`3px solid ${item.color}`}}>
                <div style={{fontSize:11,color:"var(--muted)",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:6}}>{item.label}</div>
                <div style={{fontSize:14,lineHeight:1.6}}>{item.value}</div>
              </div>
            ))}
          </div>
        </div>
        <div className="matrix-grid">
          {[{title:"Dores",items:intel.dores},{title:"Desejos",items:intel.desejos},{title:"Benefícios",items:intel.beneficios},{title:"Objeções",items:intel.objecoes},{title:"Gatilhos",items:intel.gatilhos}].map(col => (
            <div key={col.title} className="matrix-card">
              <div className="matrix-card-title">{col.title}</div>
              {(col.items||[]).map((item,i) => <div key={i} className="matrix-item">· {item}</div>)}
            </div>
          ))}
        </div>
      </div>
    );
  }

  function renderHistory() {
    if (projects.length === 0) return (
      <div className="content"><div className="empty-state"><div className="empty-icon">📂</div><div className="empty-title">Nenhum projeto ainda</div><div className="empty-desc">Crie seu primeiro projeto para ver o histórico aqui.</div></div></div>
    );
    return (
      <div className="content">
        <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:20,marginBottom:20}}>Histórico de Projetos</div>
        <div className="history-list">
          {projects.map(p => (
            <div key={p.id} className="history-item" onClick={() => { setActiveProject(p); setView("results"); }}>
              <div style={{fontSize:22}}>🎬</div>
              <div className="history-info"><div className="history-name">{p.name}</div><div className="history-meta">{p.objetivo} · {p.date}</div></div>
              <div className="history-badge">18 roteiros</div>
            </div>
          ))}
        </div>
      </div>
    );
  }

  return (
    <div className="app">
      <aside className="sidebar">
        <div className="sidebar-logo">
          <div className="logo-mark">M</div>
          <div className="logo-text">MCP<span>Studio</span></div>
        </div>
        <div className="sidebar-section">
          <div className="sidebar-label">Menu</div>
          {navItems.map(item => (
            <button key={item.id} className={`sidebar-btn ${view===item.id?"active":""}`} onClick={() => setView(item.id)}>
              <span className="icon">{item.icon}</span>{item.label}
              {item.badge && <span className="badge">{item.badge}</span>}
            </button>
          ))}
        </div>
        {projects.length > 0 && (
          <div className="sidebar-section" style={{marginTop:20}}>
            <div className="sidebar-label">Projetos Recentes</div>
            {projects.slice(0,5).map(p => (
              <button key={p.id} className={`sidebar-btn ${activeProject?.id===p.id&&view==="results"?"active":""}`} onClick={() => { setActiveProject(p); setView("results"); }}>
                <span className="icon">🎬</span>
                <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</span>
              </button>
            ))}
          </div>
        )}
        <button className="sidebar-new-btn" onClick={() => setView("briefing")}>+ Novo projeto</button>
        <div className="sidebar-footer">
          <div className="user-card">
            <div className="user-avatar">U</div>
            <div><div className="user-name">MCP Studio</div><div className="user-plan">✦ Pro</div></div>
          </div>
        </div>
      </aside>

      <main className="main">
        <div className="topbar">
          <div className="topbar-title">
            {view==="home"&&"Dashboard"}{view==="briefing"&&"Novo Projeto"}{view==="results"&&(activeProject?.name||"Resultados")}{view==="history"&&"Histórico"}
          </div>
          <div className="topbar-pill"><span className="dot" />IA conectada</div>
          {apiKey && <button className="action-btn" onClick={() => { setApiKey(""); localStorage.removeItem("mcp_api_key"); }} style={{fontSize:11,padding:"5px 10px"}}>🔑 Trocar chave</button>}
        </div>
        {view==="home" && renderHome()}
        {view==="briefing" && renderBriefing()}
        {view==="results" && renderResults()}
        {view==="history" && renderHistory()}
      </main>

      {generating && (
        <div className="generating-overlay">
          <div className="generating-card">
            <div className="gen-spinner" />
            <div className="gen-title">Gerando seus roteiros...</div>
            <div className="gen-sub">A IA está aplicando o método MCP completo ao seu briefing.</div>
            <div className="gen-steps">
              {GEN_STEPS.map((s,i) => (
                <div key={i} className={`gen-step ${i<genStep?"done":i===genStep?"active":""}`}>
                  <span className="step-dot" />{s}
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {toast && (
        <div className={`toast ${toast.type}`}>
          <span style={{fontSize:16}}>{toast.type==="error"?"⚠️":"✓"}</span>{toast.msg}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
