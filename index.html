<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MCP Studio — Gerador de Roteiros</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0A0F;--surface:#111118;--surface2:#18181F;--surface3:#1E1E28;
  --border:rgba(255,255,255,0.07);--border-h:rgba(255,255,255,0.14);
  --accent:#FF4D00;--accent2:#FF8A50;--gold:#F5C842;--success:#2DDE98;
  --purple:#9B8EFF;--text:#F0EEE8;--muted:#6B6B7A;--muted2:#9B9BAA;
  --r:14px;--rs:8px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border-h);border-radius:3px}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:240px;min-width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 0;overflow-y:auto;transition:transform .3s}
.logo{padding:0 20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo-mark{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:13px;color:#fff;flex-shrink:0}
.logo-text{font-family:'Syne',sans-serif;font-weight:700;font-size:16px;letter-spacing:-.3px}
.logo-text span{color:var(--accent)}
.nav{padding:16px 12px 0}
.nav-label{font-size:10px;font-weight:500;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);padding:0 8px;margin-bottom:6px}
.nav-btn{width:100%;display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--rs);border:none;background:transparent;color:var(--muted2);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .15s;text-align:left}
.nav-btn:hover{background:var(--surface2);color:var(--text)}
.nav-btn.active{background:rgba(255,77,0,0.12);color:var(--accent2)}
.nav-btn .ic{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.nav-btn .badge{margin-left:auto;background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px}
.new-btn{margin:16px 12px 0;display:flex;align-items:center;justify-content:center;gap:7px;padding:10px;border-radius:var(--rs);border:1px dashed var(--border-h);background:transparent;color:var(--muted2);font-family:'DM Sans',sans-serif;font-size:12.5px;cursor:pointer;transition:all .2s}
.new-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(255,77,0,0.05)}
.sidebar-footer{margin-top:auto;padding:14px;border-top:1px solid var(--border)}
.user-card{display:flex;align-items:center;gap:9px;padding:9px;border-radius:var(--rs);background:var(--surface2)}
.user-av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--gold));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.user-name{font-size:12.5px;font-weight:500}
.user-plan{font-size:10.5px;color:var(--gold)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:58px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:14px;flex-shrink:0}
.topbar-title{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pill{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;background:var(--surface2);border:1px solid var(--border);font-size:11.5px;color:var(--muted2);flex-shrink:0}
.dot{width:6px;height:6px;border-radius:50%;background:var(--success);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.content{flex:1;overflow-y:auto;padding:24px}
.hero{background:linear-gradient(135deg,#1A1008 0%,#0F0F18 60%,#0A0A0F 100%);border:1px solid var(--border);border-radius:20px;padding:32px;margin-bottom:20px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-50px;right:-50px;width:200px;height:200px;background:radial-gradient(circle,rgba(255,77,0,.18) 0%,transparent 70%);pointer-events:none}
.hero-tag{display:inline-flex;align-items:center;gap:5px;background:rgba(255,77,0,.15);border:1px solid rgba(255,77,0,.3);border-radius:20px;padding:3px 11px;font-size:10.5px;font-weight:500;color:var(--accent2);margin-bottom:14px;letter-spacing:.5px}
.hero-title{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(22px,4vw,30px);line-height:1.15;letter-spacing:-.5px;margin-bottom:10px}
.hero-title span{color:var(--accent)}
.hero-sub{font-size:14px;color:var(--muted2);line-height:1.6;max-width:440px}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;cursor:pointer;transition:all .2s}
.card:hover{border-color:var(--border-h);transform:translateY(-2px)}
.card.primary{border-color:rgba(255,77,0,.35);background:rgba(255,77,0,.05)}
.card-icon{font-size:22px;margin-bottom:10px}
.card-title{font-family:'Syne',sans-serif;font-weight:700;font-size:13.5px;margin-bottom:5px}
.card-desc{font-size:12px;color:var(--muted2);line-height:1.5}
.card-cta{margin-top:12px;font-size:11.5px;font-weight:500;color:var(--accent2)}
.api-banner{background:rgba(255,77,0,.08);border:1px solid rgba(255,77,0,.25);border-radius:var(--r);padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.api-banner input{flex:1;min-width:180px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:7px 11px;outline:none}
.api-banner input:focus{border-color:rgba(255,77,0,.5)}
.api-save{padding:7px 14px;border-radius:var(--rs);border:none;background:var(--accent);color:#fff;font-size:12.5px;font-weight:600;cursor:pointer;white-space:nowrap}
.form-wrap{max-width:680px}
.form-head{margin-bottom:24px}
.form-head h2{font-family:'Syne',sans-serif;font-weight:700;font-size:20px;margin-bottom:5px}
.form-head p{color:var(--muted2);font-size:13.5px}
.section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:14px}
.sec-title{font-family:'Syne',sans-serif;font-weight:700;font-size:12px;color:var(--accent2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border)}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.field label{font-size:12px;font-weight:500;color:var(--muted2)}
.field input,.field textarea{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13.5px;padding:9px 12px;transition:border-color .2s;resize:none;outline:none;width:100%}
.field input:focus,.field textarea:focus{border-color:rgba(255,77,0,.5)}
.field textarea{min-height:72px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.input-tabs{display:flex;gap:6px;margin-bottom:14px}
.input-tab{flex:1;padding:9px;border-radius:var(--rs);border:1px solid var(--border);background:var(--surface2);color:var(--muted2);font-family:'DM Sans',sans-serif;font-size:12.5px;cursor:pointer;transition:all .15s;text-align:center;display:flex;align-items:center;justify-content:center;gap:6px}
.input-tab:hover{border-color:var(--border-h)}
.input-tab.active{border-color:var(--accent);background:rgba(255,77,0,.08);color:var(--accent2)}
.img-upload{border:2px dashed var(--border);border-radius:var(--rs);padding:24px;text-align:center;cursor:pointer;transition:all .2s;background:var(--surface2)}
.img-upload:hover,.img-upload.drag{border-color:var(--accent);background:rgba(255,77,0,.05)}
.img-upload-icon{font-size:28px;margin-bottom:8px}
.img-upload-text{font-size:13px;color:var(--muted2)}
.img-upload-text span{color:var(--accent2);font-weight:500}
.img-previews{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.img-thumb{position:relative;width:64px;height:64px;border-radius:var(--rs);overflow:hidden;border:1px solid var(--border)}
.img-thumb img{width:100%;height:100%;object-fit:cover}
.img-thumb-del{position:absolute;top:2px;right:2px;width:16px;height:16px;border-radius:50%;background:rgba(0,0,0,.7);border:none;color:#fff;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.obj-question{font-size:13px;color:var(--muted2);margin-bottom:12px}
.obj-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.obj-opt{padding:16px 10px;border-radius:var(--rs);border:1px solid var(--border);background:var(--surface2);cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;text-align:center;gap:7px}
.obj-opt:hover{border-color:var(--border-h)}
.obj-opt.sel{border-color:var(--accent);background:rgba(255,77,0,.08)}
.obj-ic{font-size:24px}
.obj-label{font-size:12.5px;font-weight:600;line-height:1.3}
.obj-desc{font-size:11px;color:var(--muted);line-height:1.4}
.price-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.price-opt{padding:8px 4px;border-radius:var(--rs);border:1px solid var(--border);background:var(--surface2);text-align:center;cursor:pointer;transition:all .15s;font-size:10.5px;color:var(--muted2)}
.price-opt:hover{border-color:var(--border-h)}
.price-opt.sel{border-color:var(--accent);background:rgba(255,77,0,.1);color:var(--accent2)}
.gen-btn{width:100%;padding:15px;border-radius:var(--rs);border:none;background:var(--accent);color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:14.5px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:9px;margin-top:8px}
.gen-btn:hover{background:#FF6520;transform:translateY(-1px);box-shadow:0 8px 24px rgba(255,77,0,.3)}
.gen-btn:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}
.overlay{position:fixed;inset:0;background:rgba(10,10,15,.93);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(8px);padding:20px}
.gen-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px 48px;text-align:center;max-width:400px;width:100%}
.spinner{width:56px;height:56px;margin:0 auto 20px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.gen-title{font-family:'Syne',sans-serif;font-weight:700;font-size:18px;margin-bottom:6px}
.gen-sub{color:var(--muted2);font-size:13px;line-height:1.6}
.gen-steps{margin-top:20px;display:flex;flex-direction:column;gap:6px;text-align:left}
.gen-step{display:flex;align-items:center;gap:9px;font-size:12.5px;color:var(--muted);padding:7px 10px;border-radius:var(--rs);transition:all .3s}
.gen-step.active{background:rgba(255,77,0,.08);color:var(--text)}
.gen-step.done{color:var(--success)}
.gen-step .sdot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0}
.gen-step.active .sdot{background:var(--accent);animation:pulse 1s infinite}
.gen-step.done .sdot{background:var(--success)}
.personas-section{margin-bottom:24px}
.personas-title{font-family:'Syne',sans-serif;font-weight:700;font-size:16px;margin-bottom:4px}
.personas-sub{font-size:13px;color:var(--muted2);margin-bottom:14px}
.personas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.persona-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.persona-card:hover{border-color:var(--border-h)}
.persona-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.persona-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.persona-name{font-family:'Syne',sans-serif;font-weight:700;font-size:13px}
.persona-type{font-size:11px;color:var(--muted);margin-top:1px}
.persona-row{display:flex;gap:6px;margin-bottom:6px;align-items:flex-start}
.persona-row-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);min-width:60px;margin-top:1px}
.persona-row-val{font-size:12px;color:var(--muted2);line-height:1.4}
.insights-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:20px}
.insights-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.insight-item{padding:13px;background:var(--surface2);border-radius:var(--rs)}
.insight-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:5px}
.insight-val{font-size:13px;line-height:1.5}
.results-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:14px;flex-wrap:wrap}
.results-title{font-family:'Syne',sans-serif;font-weight:800;font-size:20px}
.results-meta{font-size:12.5px;color:var(--muted2);margin-top:3px}
.results-actions{display:flex;gap:7px;flex-wrap:wrap}
.act-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--rs);border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:12.5px;cursor:pointer;transition:all .15s}
.act-btn:hover{border-color:var(--border-h)}
.act-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.act-btn.primary:hover{background:#FF6520}
.tabs{display:flex;gap:3px;margin-bottom:18px;border-bottom:1px solid var(--border);overflow-x:auto}
.tab{padding:7px 14px 11px;border:none;background:transparent;color:var(--muted2);font-family:'DM Sans',sans-serif;font-size:12.5px;font-weight:500;cursor:pointer;transition:all .15s;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent2);border-bottom-color:var(--accent)}
.scripts{display:flex;flex-direction:column;gap:14px}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:border-color .2s}
.sc:hover{border-color:var(--border-h)}
.sc-head{display:flex;align-items:center;gap:10px;padding:14px 18px;cursor:pointer}
.sc-num{width:26px;height:26px;border-radius:6px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:11px;color:#fff;flex-shrink:0}
.sc-info{flex:1;min-width:0}
.sc-title{font-family:'Syne',sans-serif;font-weight:700;font-size:13.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sc-pilar{font-size:11px;color:var(--muted2);margin-top:1px}
.sc-tags{display:flex;gap:5px;flex-shrink:0}
.tag{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500;background:var(--surface2);border:1px solid var(--border);color:var(--muted2)}
.tag.topo{background:rgba(45,222,152,.1);border-color:rgba(45,222,152,.2);color:var(--success)}
.tag.meio{background:rgba(245,200,66,.1);border-color:rgba(245,200,66,.2);color:var(--gold)}
.tag.fundo{background:rgba(255,77,0,.1);border-color:rgba(255,77,0,.2);color:var(--accent2)}
.tag.ugc{background:rgba(155,142,255,.1);border-color:rgba(155,142,255,.2);color:var(--purple)}
.sc-body{padding:18px;display:none;border-top:1px solid var(--border)}
.sc-body.open{display:block}
.sc-block{margin-bottom:14px}
.sc-block-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:7px;display:flex;align-items:center;gap:7px}
.sc-block-label::before{content:'';display:inline-block;width:3px;height:11px;background:var(--accent);border-radius:2px}
.sc-block-label.bl::before{background:var(--gold)}
.sc-block-label.cl::before{background:var(--success)}
.sc-block-text{font-size:13.5px;line-height:1.75;color:var(--text);background:var(--surface2);border-radius:var(--rs);padding:12px 14px;white-space:pre-wrap}
.sc-foot{display:flex;justify-content:flex-end;margin-top:14px}
.var-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:18px}
.var-title{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.var-title::after{content:'';flex:1;height:1px;background:var(--border)}
.var-btns{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.var-btn{padding:11px;border-radius:var(--rs);border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:12.5px;cursor:pointer;transition:all .15s;text-align:center}
.var-btn:hover{border-color:var(--border-h);background:var(--surface3)}
.var-btn span{display:block;font-size:18px;margin-bottom:4px}
.var-btn.loading{opacity:.6;cursor:not-allowed}
.copy-btn{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--rs);border:1px solid var(--border);background:transparent;color:var(--muted2);font-size:11.5px;cursor:pointer;transition:all .15s}
.copy-btn:hover{border-color:var(--border-h);color:var(--text)}
.copy-btn.copied{border-color:rgba(45,222,152,.3);color:var(--success)}
.matrix-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.matrix-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.matrix-card-title{font-family:'Syne',sans-serif;font-weight:700;font-size:11px;color:var(--accent2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.matrix-item{padding:5px 0;border-bottom:1px solid var(--border);font-size:12.5px;color:var(--muted2)}
.matrix-item:last-child{border-bottom:none}
.hist-list{display:flex;flex-direction:column;gap:10px}
.hist-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:border-color .15s}
.hist-item:hover{border-color:var(--border-h)}
.hist-info{flex:1}
.hist-name{font-weight:500;font-size:13.5px;margin-bottom:2px}
.hist-meta{font-size:11.5px;color:var(--muted)}
.hist-badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;background:rgba(255,77,0,.1);border:1px solid rgba(255,77,0,.2);color:var(--accent2)}
.empty{text-align:center;padding:56px 20px}
.empty-icon{font-size:44px;margin-bottom:14px;opacity:.45}
.empty-title{font-family:'Syne',sans-serif;font-weight:700;font-size:17px;margin-bottom:7px}
.empty-desc{color:var(--muted2);font-size:13.5px}
.toast{position:fixed;bottom:20px;right:20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:10px 14px;display:flex;align-items:center;gap:8px;font-size:12.5px;box-shadow:0 8px 32px rgba(0,0,0,.4);z-index:200;animation:slideUp .3s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.mob-topbar{display:none;height:54px;border-bottom:1px solid var(--border);align-items:center;padding:0 16px;gap:12px;flex-shrink:0;background:var(--surface)}
.mob-menu-btn{background:transparent;border:none;color:var(--text);font-size:18px;cursor:pointer;padding:4px}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:49;backdrop-filter:blur(4px)}
@media(max-width:768px){
  .sidebar{position:fixed;left:0;top:0;height:100%;z-index:50;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.open{display:block}
  .mob-topbar{display:flex}
  .content{padding:16px}
  .field-row{grid-template-columns:1fr}
  .price-grid{grid-template-columns:repeat(3,1fr)}
  .obj-grid{grid-template-columns:1fr}
